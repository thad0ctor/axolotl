base_model: Qwen/Qwen2.5-VL-7B-Instruct
processor_type: AutoProcessor
trust_remote_code: true

load_in_4bit: true

# Cache prepared shards to resume without replaying image preprocessing.
pretraining_dataset:
  - path: /path/to/mm_cpt_shards/*.jsonl
    ds_type: json
    type: multimodal_pretrain
    split: train
    text_column: text
    image_column: images
    image_base_dir: /path/to/images
    # image_token: "<|image_pad|>"

streaming: true
dataset_prepared_path: last_run_prepared/qwen2_5_vl_mm_cpt_stream_cache
ignore_data_skip: true
max_steps: 10000
val_set_size: 0.0
output_dir: ./outputs/qwen2_5_vl_mm_cpt_stream

adapter: qlora
lora_model_dir:

sequence_len: 8192
pad_to_sequence_len: false
sample_packing: false
remove_unused_columns: false

lora_r: 32
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules: 'model.language_model.layers.[\d]+.(mlp|cross_attn|self_attn).(up|down|gate|q|k|v|o)_proj'

wandb_project:
wandb_entity:
wandb_watch:
wandb_name:
wandb_log_model:

gradient_accumulation_steps: 4
micro_batch_size: 1
optimizer: adamw_bnb_8bit
lr_scheduler: cosine
learning_rate: 0.0002

bf16: true
fp16:
tf32: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
logging_steps: 1
attn_implementation: flash_attention_2

warmup_ratio: 0.1
save_steps: 1000
eval_steps: 1000
weight_decay: 0.0
